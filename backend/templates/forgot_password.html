{% extends "base.html" %}
{% block title %}Forgot password — YourRA{% endblock %}
{% block content %}
<section class="container-page py-16 flex justify-center">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-extrabold">Reset your password</h1>
      <p class="muted text-sm mt-1">Enter your email and we will send you a reset link.</p>
    </div>
    <div class="card card-pad" x-data="{ loading: false, error: '', sent: false }">
      <form x-show="!sent" @submit.prevent="
        loading = true; error = '';
        fetch('/api/auth/forgot-password', { method: 'POST', body: new FormData($el) })
          .then(async r => {
            const d = await r.json();
            if (!r.ok) throw new Error(d.detail || 'Failed');
            sent = true;
          })
          .catch(e => { error = e.message; })
          .finally(() => { loading = false; })
      ">
        <label class="label">Email address</label>
        <input type="email" name="email" required class="field mb-5" placeholder="you@example.com">
        <button type="submit" :disabled="loading" class="btn btn-primary w-full">
          <span x-show="!loading">Send reset link</span>
          <span x-show="loading">Sending…</span>
        </button>
        <p x-show="error" x-text="error" class="text-rose-600 text-sm mt-3"></p>
      </form>
      <div x-show="sent" class="text-center py-4">
        <p class="font-semibold text-green-700 mb-2">Reset link sent.</p>
        <p class="muted text-sm">Check your inbox (and spam folder). The link expires in 1 hour.</p>
      </div>
    </div>
    <p class="text-center text-sm muted mt-5">
      <a href="/login" class="text-indigo-600 font-medium">Back to login</a>
    </p>
  </div>
</section>
{% endblock %}
