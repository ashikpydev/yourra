<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin login — YourRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:var(--ink-50)">
  <div class="w-full max-w-sm px-4">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-3">
        <span class="brand-logo" style="background:linear-gradient(135deg,var(--brand-600),var(--brand-700))">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
            <circle cx="6" cy="6" r="1.4"/><circle cx="18" cy="6" r="1.4"/>
            <path d="M6 6 C 8.5 10, 10 12, 12 15" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <path d="M18 6 C 15.5 10, 14 12, 12 15" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 15 L12 20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="text-xl font-extrabold">Your<span style="color:var(--brand-600)">RA</span></span>
      </div>
      <p class="text-xs font-semibold uppercase tracking-widest text-slate-400">Admin panel</p>
    </div>

    <div class="card card-pad">
      <h1 class="text-lg font-bold mb-5">Sign in</h1>
      {% if error %}
      <div class="mb-4 rounded-lg bg-rose-50 border border-rose-200 text-rose-700 text-sm px-4 py-3">{{ error }}</div>
      {% endif %}
      <form method="post" action="/admin/login">
        <label class="label">Username</label>
        <input type="text" name="username" required autofocus class="field mb-4" autocomplete="username">
        <label class="label">Password</label>
        <input type="password" name="password" required class="field mb-6" autocomplete="current-password">
        <button type="submit" class="btn btn-primary w-full">Sign in</button>
      </form>
    </div>

    <p class="text-center text-xs muted mt-6">
      <a href="/" class="text-indigo-600">Back to site</a>
    </p>
  </div>
</body>
</html>
